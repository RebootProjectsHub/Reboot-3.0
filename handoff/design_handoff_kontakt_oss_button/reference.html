<!DOCTYPE html>
<html lang="nb">
<head>
<meta charset="UTF-8">
<title>Kontakt oss — navbar CTA reference (3b ✦)</title>
<link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@600&display=swap" rel="stylesheet">
<style>
  body { margin: 0; min-height: 100vh; display: flex; align-items: center; justify-content: center; background: #F4ECE3; }
  .cta-kontakt {
    display: inline-flex; align-items: center; gap: 9px;
    background: #4A1220; color: #FCF2EC;
    font-family: 'Hanken Grotesk', sans-serif; font-weight: 600; font-size: 15px;
    padding: 13px 24px; border-radius: 999px; text-decoration: none;
    transition: transform 0.2s ease, background-color 0.2s ease;
  }
  .cta-kontakt:hover { transform: translateY(-2px); background: #3A0E19; }
  .cta-kontakt:active { transform: translateY(1px); }
  .cta-kontakt .doodle { color: #F73A3C; font-size: 16px; line-height: 1; }
</style>
</head>
<body>
<a class="cta-kontakt" href="/kontakt"><span class="doodle" aria-hidden="true">✦</span>Kontakt oss</a>
</body>
</html>
